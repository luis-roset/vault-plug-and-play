name: package and release vault-splunk

on:
  push:
    # we want to release via tags
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

env:
  TAG: ${{ github.ref_name }}
  SHA: ${{ github.sha }}

jobs:
  package-validate-inspect:
    runs-on: [ self-hosted, linux, small ]
    steps:
    - name: checkout
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.0.0
    - name: package app
      run: make build-package
    - name: validate app
      run: make validate-package
    - name: appinspect
      run: make appinspect-package
    - name: appinspect cloud
      run: make appinspect-package-cloud
    - name: upload artifacts
      uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
      with: 
        name: artifact
        path: ./pkg

  publish-splunk-app:
   runs-on: [ self-hosted, linux, small ]
   needs: package-validate-inspect
   permissions:
     id-token: write
     contents: read
   steps:
   - name: Authenticate to Vault
     id: vault-auth
     run: vault-auth
   - name: Retrieve Vault-hosted Secrets
     id: secrets
     uses: hashicorp/vault-action@v3.0.0
     with:
       url: ${{ steps.vault-auth.outputs.addr }}
       caCertificate: ${{ steps.vault-auth.outputs.ca_certificate }}
       token: ${{ steps.vault-auth.outputs.token }}
       secrets: |
         kv/data/github/${{ github.repository }}/splunkbase_password password | SPLUNK_PASSWORD;
   - name: checkout
     uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.0.0
   - name: download artifacts
     uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
     with:
       name: artifact
       path: ./pkg
   - name: publish splunk app
     env:
       SPLUNK_PASSWORD: ${{ steps.secrets.outputs.SPLUNK_PASSWORD }}
     run: make publish
    
  github-release:
    needs: publish-splunk-app
    runs-on: [ self-hosted, linux, small ]
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Authenticate to Vault
        id: vault-auth
        run: vault-auth
      - name: Retrieve Vault-hosted Secrets
        id: secrets
        uses: hashicorp/vault-action@v3.0.0
        with:
          url: ${{ steps.vault-auth.outputs.addr }}
          caCertificate: ${{ steps.vault-auth.outputs.ca_certificate }}
          token: ${{ steps.vault-auth.outputs.token }}
          secrets: |
            kv/data/github/${{ github.repository }}/slack_webhook webhook | SLACK_WEBHOOK ;
      - name: checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.0.0
      - name: download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with: 
          name: artifact
      - name: publish github release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.TAG }}
          COMMIT: ${{ env.SHA }}
        run: |
          ls
          gh release create "${TAG}" vault-0.0.0.tar.gz --repo hashicorp/vault-splunk --target "${COMMIT}"
      - name: Send custom JSON data to Slack workflow
        id: slack-success
        if: ${{ success() }}
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        with:
          payload: |
            {
              "message": "Vault Splunk app publish successful!"
              "github-release": "GitHub release successfully published to: https://github.com/hashicorp/vault-splunk/releases/tag/${TAG}" 
              "splunk-app": "Uploaded Vault Splunk app to: https://splunkbase.splunk.com/app/5093/edit/#/hosting"
              "repo": "${{ github.repositoryUrl }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ steps.secrets.outputs.SLACK_WEBHOOK }}
      - name: Send custom JSON data to Slack workflow
        id: slack-failure
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        with:
          payload: |
            {
              "message": "Vault Splunk app publish was not successful"
              "repo": "${{ github.repositoryUrl }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ steps.secrets.outputs.slack_webhook }}
